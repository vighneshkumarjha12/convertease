services:
  - type: web
    name: convertease
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn converter.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.9"
    autoDeploy: true
